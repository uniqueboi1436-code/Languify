<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Test - Languify</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .working { color: green; }
        .not-working { color: red; }
        .language { margin: 5px 0; padding: 5px; border: 1px solid #ccc; }
        .summary { font-weight: bold; margin: 20px 0; }
        button { padding: 10px 20px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Voice Test Results</h1>
    <button onclick="testAllVoices()">Test All Voices</button>
    <button onclick="clearResults()">Clear Results</button>

    <div class="summary" id="summary"></div>

    <h2>Languages with Working Voices:</h2>
    <div id="working-languages"></div>

    <h2>Languages without Working Voices:</h2>
    <div id="not-working-languages"></div>

    <script src="languages.js"></script>
    <script>
        function testAllVoices() {
            const working = [];
            const notWorking = [];

            // Wait for voices to load
            if (window.speechSynthesis.getVoices().length === 0) {
                window.speechSynthesis.onvoiceschanged = () => testVoices();
            } else {
                testVoices();
            }

            function testVoices() {
                const voices = window.speechSynthesis.getVoices();
                console.log('Available voices:', voices.length);

                LANGUAGES.forEach(lang => {
                    const hasVoice = checkLanguageHasVoice(lang.code, voices);
                    if (hasVoice) {
                        working.push(lang);
                    } else {
                        notWorking.push(lang);
                    }
                });

                displayResults(working, notWorking);
            }
        }

        function checkLanguageHasVoice(langCode, voices) {
            // Language mapping from script.js
            const languageMap = {
                'auto': 'en-US',
                'en': 'en-US',
                'es': 'es-ES',
                'fr': 'fr-FR',
                'de': 'de-DE',
                'it': 'it-IT',
                'pt': 'pt-BR',
                'ru': 'ru-RU',
                'ja': 'ja-JP',
                'ko': 'ko-KR',
                'zh': 'zh-CN',
                'zh-TW': 'zh-TW',
                'ar': 'ar-SA',
                'hi': 'hi-IN',
                'th': 'th-TH',
                'vi': 'vi-VN',
                'tr': 'tr-TR',
                'nl': 'nl-NL',
                'sv': 'sv-SE',
                'no': 'no-NO',
                'da': 'da-DK',
                'fi': 'fi-FI',
                'el': 'el-GR',
                'hu': 'hu-HU',
                'cs': 'cs-CZ',
                'ro': 'ro-RO',
                'bg': 'bg-BG',
                'hr': 'hr-HR',
                'uk': 'uk-UA',
                'pl': 'pl-PL',
                // African
                'af': 'af-ZA',
                'am': 'am-ET',
                'ny': 'ny-MW',
                'st': 'st-ZA',
                'sn': 'sn-ZW',
                'so': 'so-SO',
                'sw': 'sw-KE',
                'yo': 'yo-NG',
                'zu': 'zu-ZA',
                'xh': 'xh-ZA',
                'rw': 'rw-RW',
                'lg': 'lg-UG',
                'mg': 'mg-MG',
                'ti': 'ti-ER',
                // European
                'sq': 'sq-AL',
                'hy': 'hy-AM',
                'eu': 'eu-ES',
                'be': 'be-BY',
                'bs': 'bs-BA',
                'ca': 'ca-ES',
                'ceb': 'ceb-PH',
                'et': 'et-EE',
                'gl': 'gl-ES',
                'ka': 'ka-GE',
                'is': 'is-IS',
                'ga': 'ga-IE',
                'lv': 'lv-LV',
                'lt': 'lt-LT',
                'lb': 'lb-LU',
                'mk': 'mk-MK',
                'mt': 'mt-MT',
                'gd': 'gd-GB',
                'sr': 'sr-RS',
                'sk': 'sk-SK',
                'sl': 'sl-SI',
                'cy': 'cy-GB',
                'fo': 'fo-FO',
                'fy': 'fy-NL',
                'eo': 'eo',
                // Asian
                'lo': 'lo-LA',
                'km': 'km-KH',
                'my': 'my-MM',
                'tl': 'tl-PH',
                'id': 'id-ID',
                'ms': 'ms-MY',
                'bn': 'bn-BD',
                'pa': 'pa-IN',
                'ur': 'ur-PK',
                'ta': 'ta-IN',
                'te': 'te-IN',
                'mr': 'mr-IN',
                'gu': 'gu-IN',
                'kn': 'kn-IN',
                'ml': 'ml-IN',
                'or': 'or-IN',
                'ne': 'ne-NP',
                'mai': 'mai-IN',
                'bho': 'bho-IN',
                'new': 'new-NP',
                'taj': 'taj-NP',
                'si': 'si-LK',
                'dv': 'dv-MV',
                'as': 'as-IN',
                'bh': 'bh-IN',
                'sa': 'sa-IN',
                'fa': 'fa-IR',
                'he': 'he-IL',
                'ps': 'ps-AF',
                'az': 'az-AZ',
                'kk': 'kk-KZ',
                'ky': 'ky-KG',
                'tg': 'tg-TJ',
                'tk': 'tk-TM',
                'uz': 'uz-UZ',
                'mn': 'mn-MN',
                'dz': 'dz-BT',
                'tet': 'tet-TL',
                // Americas
                'ak': 'ak-GH',
                'ha': 'ha-NG',
                'ig': 'ig-NG',
                'la': 'la',
                'mi': 'mi-NZ',
                'qu': 'qu-PE',
                'ay': 'ay-BO',
                'gn': 'gn-PY',
            };

            const targetLang = languageMap[langCode] || langCode;
            const targetLangBase = targetLang.split('-')[0];

            // Check for exact match
            let voice = voices.find(v => v.lang.toLowerCase() === targetLang.toLowerCase());

            // Check for language family match
            if (!voice) {
                voice = voices.find(v => v.lang.toLowerCase().startsWith(targetLangBase + '-'));
            }

            // Check for flexible match
            if (!voice) {
                voice = voices.find(v => {
                    const vLang = v.lang.toLowerCase();
                    return vLang.startsWith(targetLang.toLowerCase()) || targetLang.toLowerCase().startsWith(vLang);
                });
            }

            // Check voice name
            if (!voice) {
                voice = voices.find(v =>
                    v.name.toLowerCase().includes(langCode) ||
                    v.name.toLowerCase().includes(targetLangBase)
                );
            }

            return !!voice;
        }

        function displayResults(working, notWorking) {
            const summary = document.getElementById('summary');
            summary.innerHTML = `
                <p>Total Languages: ${LANGUAGES.length}</p>
                <p class="working">Languages with voices: ${working.length}</p>
                <p class="not-working">Languages without voices: ${notWorking.length}</p>
            `;

            const workingDiv = document.getElementById('working-languages');
            workingDiv.innerHTML = working.map(lang =>
                `<div class="language working">${lang.name} (${lang.code})</div>`
            ).join('');

            const notWorkingDiv = document.getElementById('not-working-languages');
            notWorkingDiv.innerHTML = notWorking.map(lang =>
                `<div class="language not-working">${lang.name} (${lang.code}) - <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(lang.name + ' pronunciation')}" target="_blank">Listen on YouTube</a></div>`
            ).join('');
        }

        function clearResults() {
            document.getElementById('summary').innerHTML = '';
            document.getElementById('working-languages').innerHTML = '';
            document.getElementById('not-working-languages').innerHTML = '';
        }
    </script>
</body>
</html>
